name: 一次编译3架构 OpenWrt + sing-box (Release自动发布)
on:
  workflow_dispatch:  # 手动一键触发

# 必须开启Release发布权限
permissions:
  contents: write

jobs:
  build:
    # 并行编译3种架构，速度极快
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64               # x86_64 架构
          - armvirt-64           # armv8 / arm64 架构
          - qualcommax_ipq807x   # ipq807x 架构

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl

      - name: 克隆 OpenWrt 25.12.2 源码
        run: |
          git clone --depth=1 --branch=v25.12.2 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: 集成 sing-box 预编译二进制包
        run: |
          chmod +x scripts/prepare-singbox.sh
          cd openwrt
          ../scripts/prepare-singbox.sh ${{ matrix.target }}

      - name: 生成编译配置
        run: |
          cd openwrt
          echo "CONFIG_TARGET_${{ matrix.target }}=y" > .config
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          make defconfig

      - name: 下载编译依赖
        run: |
          cd openwrt
          make -j$(nproc) download V=s

      - name: 开始编译 OpenWrt 固件
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: 整理固件文件（按架构分类）
        run: |
          mkdir -p firmware/${{ matrix.target }}
          cp openwrt/bin/targets/*/*/*.bin firmware/${{ matrix.target }}/ 2>/dev/null || true
          cp openwrt/bin/targets/*/*/*.img.gz firmware/${{ matrix.target }}/ 2>/dev/null || true
          cp openwrt/bin/targets/*/*/*.tar.zst firmware/${{ matrix.target }}/ 2>/dev/null || true

      - name: 上传架构固件（临时存储）
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: firmware/${{ matrix.target }}/

  # 统一发布所有固件到单个 Release
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有编译好的固件
        uses: actions/download-artifact@v4
        with:
          path: firmware/
          pattern: firmware-*
          merge-multiple: true

      - name: 设置版本信息
        run: |
          echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
          echo "OPENWRT_VER=25.12.2" >> $GITHUB_ENV
          echo "SINGBOX_VER=1.13.11" >> $GITHUB_ENV

      - name: 创建 Release 并上传全部3种固件
        uses: softprops/action-gh-release@v2
        with:
          tag_name: openwrt-singbox-${{ env.BUILD_DATE }}
          name: OpenWrt ${{ env.OPENWRT_VER }} + sing-box ${{ env.SINGBOX_VER }} | 全架构固件
          body: |
            ✅ 自动编译 - 一次生成3种架构
            📌 OpenWrt 版本: 25.12.2
            📌 sing-box 版本: v1.13.11
            📌 支持架构: x86_64 / armv8 / ipq807x
            📌 编译日期: ${{ env.BUILD_DATE }}
          files: firmware/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
