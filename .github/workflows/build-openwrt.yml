name: Build OpenWrt + sing-box (Release自动发布)
on:
  workflow_dispatch:
    inputs:
      target:
        description: '选择固件架构'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - armvirt-64
          - qualcommax_ipq807x

# 必须开启权限，才能创建Release
permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl

      - name: 克隆 OpenWrt 25.12.2
        run: |
          git clone --depth=1 --branch=v25.12.2 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 集成 sing-box 预编译二进制
        run: |
          mkdir -p scripts
          cp -r scripts/prepare-singbox.sh scripts/
          chmod +x scripts/prepare-singbox.sh
          cd openwrt
          ../scripts/prepare-singbox.sh ${{ github.event.inputs.target }}

      - name: 生成编译配置
        run: |
          cd openwrt
          echo "CONFIG_TARGET_${{ github.event.inputs.target }}=y" > .config
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          make defconfig

      - name: 下载依赖
        run: |
          cd openwrt
          make -j$(nproc) download V=s

      - name: 开始编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: 整理固件文件
        run: |
          mkdir -p firmware
          cp openwrt/bin/targets/*/*/*.bin firmware/ 2>/dev/null || true
          cp openwrt/bin/targets/*/*/*.img.gz firmware/ 2>/dev/null || true
          cp openwrt/bin/targets/*/*/*.tar.zst firmware/ 2>/dev/null || true
          # 获取版本/日期信息
          echo "OPENWRT_VER=25.12.2" >> $GITHUB_ENV
          echo "SINGBOX_VER=1.13.11" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
          echo "ARCH=${{ github.event.inputs.target }}" >> $GITHUB_ENV

      - name: 创建 Release 并上传固件
        uses: softprops/action-gh-release@v2
        with:
          name: OpenWrt ${{ env.OPENWRT_VER }} + sing-box ${{ env.SINGBOX_VER }} (${{ env.ARCH }})
          tag_name: openwrt-${{ env.ARCH }}-${{ env.BUILD_DATE }}
          files: firmware/*
          body: |
            ✅ 自动编译固件
            📌 OpenWrt版本: 25.12.2
            📌 sing-box版本: v1.13.11
            📌 架构: ${{ github.event.inputs.target }}
            📌 编译日期: ${{ env.BUILD_DATE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
