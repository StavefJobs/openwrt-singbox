name: Build OpenWrt with sing-box v1.13.11
on:
  workflow_dispatch:
    inputs:
      target:
        description: '选择固件架构'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - armvirt-64
          - qualcommax_ipq807x

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl

      - name: 克隆 OpenWrt 25.12.2
        run: |
          git clone --depth=1 --branch=v25.12.2 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 集成 sing-box 预编译二进制包
        run: |
          chmod +x ./scripts/prepare-singbox.sh
          cd openwrt
          ../scripts/prepare-singbox.sh ${{ github.event.inputs.target }}

      - name: 生成编译配置
        run: |
          cd openwrt
          # 启用架构
          echo "CONFIG_TARGET_${{ github.event.inputs.target }}=y" > .config
          # 启用 sing-box
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          # 加载默认配置
          make defconfig

      - name: 下载依赖
        run: |
          cd openwrt
          make -j$(nproc) download V=s

      - name: 开始编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: 打包固件
        run: |
          mkdir -p firmware
          cp openwrt/bin/targets/*/*/*.bin firmware/ 2>/dev/null || true
          cp openwrt/bin/targets/*/*/*.img.gz firmware/ 2>/dev/null || true
          cp openwrt/bin/targets/*/*/*.tar.zst firmware/ 2>/dev/null || true

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ github.event.inputs.target }}-sing-box
          path: firmware/
